name: Deploy UI to GitHub Pages

# Publishes the static frontend/ folder so the Obsidian Editorial UI
# can be viewed live in a browser.
#
# Source must be set to "GitHub Actions" (Settings -> Pages). The
# `enablement: true` flag below also initializes the Pages site via the
# API on first run, which avoids the "Get Pages site failed" error that
# occurs when a Pages site has never been created for the repo.

on:
  push:
    branches:
      - main
      - feature/obsidian-ui-scaffold
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Initialize the Pages site via the API if it doesn't exist yet.
          enablement: true

      - name: Upload static frontend
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
