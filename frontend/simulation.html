<!DOCTYPE html>
<html lang="pt-BR" data-i18n-doctitle="doc.simTitle">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>LinguoBound · Controle Alfandegário</title>
  <link rel="stylesheet" href="css/obsidian.css" />
  <link rel="stylesheet" href="css/hud.css" />
</head>
<body class="sim-body mood-hostile">
  <div class="atmosphere"></div>
  <div class="lb-veil" id="lb-veil" data-i18n="session.checking">Verifying session…</div>

  <!-- Cinematic NPC stage: the officer is presence + light, not a cartoon -->
  <div class="stage" id="stage" aria-hidden="true">
    <div class="stage-aura" id="stage-aura"></div>
    <div class="stage-figure"></div>
    <div class="stage-fog"></div>
  </div>

  <main class="hud">

    <!-- ===== Scene bar ===== -->
    <header class="scene-bar cine">
      <button class="scene-exit" id="exit-btn"
              data-i18n-aria-label="sim.exitAria" aria-label="Sair da simulação">&#8592;</button>
      <div class="scene-meta">
        <p class="eyebrow" id="scene-loc">Londres · Bloco 04 · Módulo 11</p>
        <h1 class="display scene-title" data-i18n="scene.customs">Customs Control</h1>
      </div>
      <div class="scene-right">
        <button class="sound-btn" id="sound-toggle" data-i18n-aria-label="audio.sound" aria-label="Sound" aria-pressed="true">&#128266;</button>
        <div class="lang-toggle" role="group" aria-label="Language / Idioma">
          <button type="button" data-set-lang="pt-BR">PT</button>
          <button type="button" data-set-lang="en">EN</button>
        </div>
        <div class="scene-meters">
          <div class="meter" data-i18n-title="meter.patienceTitle"
               title="Paciência do NPC — acaba se você hesitar">
            <span class="meter-label" data-i18n="meter.patience">Patience</span>
            <div class="meter-rail"><div class="meter-fill patience" id="patience-fill"></div></div>
          </div>
          <div class="meter" data-i18n-title="meter.noiseTitle"
               title="O ruído ambiente prejudica a compreensão do NPC">
            <span class="meter-label" data-i18n="meter.noise">Noise</span>
            <div class="meter-rail"><div class="meter-fill noise" id="noise-fill"></div></div>
          </div>
        </div>
      </div>
    </header>

    <!-- ===== NPC dialogue (tap to translate) ===== -->
    <section class="dialogue cine cine-delay-1">
      <div class="npc-id">
        <span class="npc-avatar" id="npc-avatar" data-i18n="npc.officerInitials">BO</span>
        <div>
          <div class="npc-name" id="npc-name" data-i18n="npc.officerName">Border Officer</div>
          <div class="npc-mood" id="npc-mood">Impaciente · Formal</div>
        </div>
      </div>

      <button class="npc-line" id="npc-line"
              data-i18n-aria-label="npc.tapAria" aria-label="Toque para revelar a tradução">
        <span class="npc-text" id="npc-text"></span>
        <span class="npc-translation" id="npc-translation"></span>
        <span class="tap-hint" id="tap-hint" data-i18n="npc.tapHint">Tap for Mental Translation</span>
      </button>
    </section>

    <!-- ===== Survival Panel ===== -->
    <section class="panel cine cine-delay-2">

      <!-- Earpiece strip (Ponto Eletrônico) -->
      <div class="earpiece" id="earpiece" hidden>
        <span class="earpiece-icon">&#9685;</span>
        <span class="earpiece-text" id="earpiece-text">…</span>
      </div>

      <!-- 3-Way Teleprompter -->
      <div class="teleprompter">
        <div class="tp-modes" role="tablist" aria-label="Teleprompter mode">
          <button class="tp-mode active" data-mode="basic" role="tab" data-i18n="tp.basic">Basic</button>
          <button class="tp-mode" data-mode="fluent" role="tab" data-i18n="tp.fluent">Fluent</button>
          <button class="tp-mode gold" data-mode="free" role="tab" data-i18n="tp.free">Free Flight</button>
        </div>
        <div class="tp-script" id="tp-script">
          <span class="tp-prefix" data-i18n="tp.say">Say</span>
          <span class="tp-text" id="tp-text"></span>
        </div>
        <div class="tp-freeflight" id="tp-freeflight" hidden>
          <span class="ff-label" data-i18n="tp.openMic">Open mic · No script</span>
          <span class="ff-xp" data-i18n="tp.freeXp">+40% XP</span>
        </div>
      </div>

      <!-- Replay the NPC line (auditory feedback loop) -->
      <div class="replay-row">
        <span class="replay-label" data-i18n="audio.replay">Replay</span>
        <button type="button" class="ctl sm" id="replay-slow" data-i18n="audio.slow">Slow &amp; clear</button>
        <button type="button" class="ctl sm" id="replay-natural" data-i18n="audio.natural">Natural</button>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="ctl" id="earpiece-btn" aria-pressed="false">
          <span class="ctl-dot"></span> <span data-i18n="ctl.earpiece">Earpiece</span>
        </button>

        <button class="mic" id="mic-btn" data-i18n-aria-label="mic.holdAria" aria-label="Segure para falar">
          <span class="mic-ring"></span>
          <span class="mic-core">
            <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true">
              <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3z" fill="currentColor"/>
              <path d="M18 11a6 6 0 0 1-12 0M12 17v3" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="mic-wave" id="mic-wave"></span>
        </button>

        <button class="ctl" id="translate-btn">
          <span class="ctl-dot silver"></span> <span data-i18n="ctl.translate">Translate</span>
        </button>
      </div>
      <p class="mic-hint" id="mic-hint">Segure o microfone para responder</p>
    </section>
  </main>

  <!-- ===== Consequence / Feedback overlay (text set by hud.js) ===== -->
  <div class="consequence" id="consequence" aria-hidden="true">
    <div class="conseq-card glass">
      <div class="stamp" id="stamp">
        <span class="stamp-text" id="stamp-text">ADMITIDO</span>
      </div>
      <p class="eyebrow" id="conseq-label">Consequência</p>
      <h2 class="display conseq-title" id="conseq-title">Entrada Concedida</h2>
      <p class="conseq-body" id="conseq-body"></p>
      <div class="conseq-scores" id="conseq-scores"></div>
      <button class="btn btn-gold" id="conseq-continue" style="width:100%;margin-top:8px">Continuar</button>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/hud.js"></script>
  <script type="module" src="js/session.js"></script>
</body>
</html>
