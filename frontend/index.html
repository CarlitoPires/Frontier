<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FRONTIER · Acesso</title>
  <link rel="stylesheet" href="css/obsidian.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="atmosphere"></div>

  <main class="auth-shell">
    <!-- Brand column -->
    <section class="auth-brand cine">
      <p class="eyebrow">Simulador social da vida real</p>
      <h1 class="display auth-wordmark">FRONTIER</h1>
      <p class="auth-tagline">
        Você não compra cidades. Você <span class="metal">conquista</span> o direito de viver nelas.
      </p>
      <div class="passport-stamp" aria-hidden="true">
        <span class="stamp-top">ENTRADA</span>
        <span class="stamp-bottom">· VISTO ·</span>
      </div>
    </section>

    <!-- Access column -->
    <section class="auth-card glass cine cine-delay-1">
      <header class="auth-head">
        <p class="eyebrow">Acesso Seguro</p>
        <h2 class="display" style="font-size:26px">Login de Cidadão</h2>
      </header>

      <form id="login-form" autocomplete="off" novalidate>
        <div class="field">
          <input type="email" id="email" placeholder=" " required />
          <label for="email">E-mail</label>
        </div>
        <div class="field">
          <input type="password" id="password" placeholder=" " required />
          <label for="password">Senha</label>
        </div>

        <button type="submit" class="btn btn-gold" style="width:100%; margin-top:6px">
          Entrar na cidade
        </button>

        <div class="auth-divider"><span>ou</span></div>

        <button type="button" id="biometric-btn" class="btn" style="width:100%">
          <span class="bio-dot"></span> Autenticar com FaceID
        </button>
      </form>

      <p class="auth-foot">
        Ainda não tem cidadania? <a href="#" class="metal">Solicite visto de entrada</a>
      </p>
    </section>
  </main>

  <!-- Biometric / FaceID cinematic overlay -->
  <div id="bio-overlay" class="bio-overlay" aria-hidden="true">
    <div class="bio-stage">
      <svg class="bio-mesh" viewBox="0 0 200 240" aria-hidden="true">
        <g class="bio-face">
          <ellipse cx="100" cy="110" rx="62" ry="78" />
          <circle cx="76" cy="92" r="7" /><circle cx="124" cy="92" r="7" />
          <path d="M70 150 Q100 172 130 150" />
          <path d="M100 100 L100 130" />
        </g>
      </svg>
      <div class="bio-scanline"></div>
      <div class="bio-ring"></div>
    </div>
    <p id="bio-status" class="eyebrow bio-status">Alinhando geometria facial…</p>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
