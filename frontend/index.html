<!DOCTYPE html>
<html lang="pt-BR" data-i18n-doctitle="doc.authTitle">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinguoBound · Acesso</title>
  <link rel="stylesheet" href="css/obsidian.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="atmosphere"></div>

  <!-- Language toggle (EN / PT-BR) -->
  <div class="lang-toggle auth-lang" role="group" aria-label="Language / Idioma">
    <button type="button" data-set-lang="pt-BR">PT</button>
    <button type="button" data-set-lang="en">EN</button>
  </div>

  <main class="auth-shell">
    <!-- Brand column -->
    <section class="auth-brand cine">
      <p class="eyebrow" data-i18n="auth.eyebrow">Real-Life Social Simulator</p>
      <h1 class="display auth-wordmark">LinguoBound</h1>
      <p class="auth-tagline" data-i18n-html="auth.tagline">
        You do not buy cities. You <span class="metal">conquer</span> the right to live in them.
      </p>
      <div class="passport-stamp" aria-hidden="true">
        <span class="stamp-top" data-i18n="auth.stampTop">ENTRY</span>
        <span class="stamp-bottom" data-i18n="auth.stampBottom">· VISA ·</span>
      </div>
    </section>

    <!-- Access column -->
    <section class="auth-card glass cine cine-delay-1">
      <header class="auth-head">
        <p class="eyebrow" data-i18n="auth.secureAccess">Secure Access</p>
        <h2 class="display" id="auth-heading" style="font-size:26px" data-i18n="auth.citizenLogin">Citizen Login</h2>
      </header>

      <form id="login-form" autocomplete="off" novalidate>
        <div class="field">
          <input type="email" id="email" placeholder=" " required />
          <label for="email" data-i18n="auth.email">Email</label>
        </div>
        <div class="field">
          <input type="password" id="password" placeholder=" " required />
          <label for="password" data-i18n="auth.passphrase">Passphrase</label>
        </div>

        <p class="auth-error" id="auth-error" role="alert" aria-live="polite"></p>

        <div class="level-field" id="level-field" hidden>
          <span class="level-q" data-i18n="auth.levelQuestion">What is your current level?</span>
          <div class="level-opts" role="group" aria-label="Level">
            <button type="button" class="level-opt active" data-level="absolute_beginner" data-i18n="auth.levelBeginner">Absolute Beginner</button>
            <button type="button" class="level-opt" data-level="intermediate" data-i18n="auth.levelIntermediate">Intermediate</button>
            <button type="button" class="level-opt" data-level="fluent" data-i18n="auth.levelFluent">Fluent</button>
          </div>
        </div>

        <div class="field invite-field" id="invite-field" hidden>
          <input type="text" id="invite-code" placeholder=" " autocomplete="off" />
          <label for="invite-code" data-i18n="auth.invite">Invite code (optional)</label>
        </div>

        <button type="submit" id="submit-btn" class="btn btn-gold" style="width:100%; margin-top:6px" data-i18n="auth.enterCity">
          Enter the City
        </button>

        <div class="auth-divider"><span data-i18n="auth.or">or</span></div>

        <button type="button" id="biometric-btn" class="btn" style="width:100%">
          <span class="bio-dot"></span> <span data-i18n="auth.faceId">Authenticate with FaceID</span>
        </button>

        <button type="button" id="google-btn" class="btn btn-google" style="width:100%; margin-top:10px">
          <span class="g-mark" aria-hidden="true">G</span> <span data-i18n="auth.google">Sign in with Google</span>
        </button>
      </form>

      <p class="auth-foot">
        <span id="auth-foot-text" data-i18n="auth.noCitizenship">No citizenship yet?</span>
        <a href="#" class="metal" id="toggle-mode" data-i18n="auth.requestVisa">Request entry visa</a>
      </p>
    </section>
  </main>

  <!-- Biometric / FaceID cinematic overlay -->
  <div id="bio-overlay" class="bio-overlay" aria-hidden="true">
    <div class="bio-stage">
      <svg class="bio-mesh" viewBox="0 0 200 240" aria-hidden="true">
        <g class="bio-face">
          <ellipse cx="100" cy="110" rx="62" ry="78" />
          <circle cx="76" cy="92" r="7" /><circle cx="124" cy="92" r="7" />
          <path d="M70 150 Q100 172 130 150" />
          <path d="M100 100 L100 130" />
        </g>
      </svg>
      <div class="bio-scanline"></div>
      <div class="bio-ring"></div>
    </div>
    <p id="bio-status" class="eyebrow bio-status" data-i18n="auth.faceStep1">Aligning facial geometry…</p>
  </div>

  <script src="js/i18n.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
